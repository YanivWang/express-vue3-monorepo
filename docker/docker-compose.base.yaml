# 共享定义：与 docker-compose.{yaml,dev,test}.yaml 组合使用（须后接环境文件，后者覆盖同名项）。
# Redis：`REDIS_PASSWORD` 须由 compose 的 `--env-file`（如 .env.development / .env.production / .env.test）提供，
# 供 redis 容器的 requirepass、健康检查与 rest-api 的 `REDIS_URL` 解析时替换；勿提交真实生产口令到 Git。
# 对外 HTTP 由各环境覆盖层中的 gateway（docker/nginx/gateway*.docker.conf）统一暴露
# `${GATEWAY_HOST_PORT:-2026}`，再按路径转发到 rest-api、pc-portal、pc-admin（/pc-admin/）。
# 示例 dev：在仓库根执行 pnpm docker:dev；或等价地手动执行下行命令：
# docker compose --env-file .env.development -f docker/docker-compose.base.yaml -f docker/docker-compose.dev.yaml up -d
#
# mysql 不在此声明 volumes / ports / container_name，避免多环境卷合并时挂载重复路径。
# MySQL 仅在容器网格内提供服务；下方 rest-api 默认 DB_HOST=mysql，无需在宿主安装 MySQL。
# 开发栈默认不把 3306 暴露到宿主（见 docker-compose.dev.yaml）；按需映射端口供宿主工具或「宿主 Node」使用。
# rest-api 不声明 ports / env_file / APP_ENV，由各环境覆盖。

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PWD}
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s # 容器启动后先给 30 秒缓冲时间

  redis:
    # 新增: Redis 服务，后端会连接它
    image: redis:7-alpine
    restart: unless-stopped # 设置重启策略: 容器异常退出时自动重启，除非你手动停止
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in the compose env file}
      - --appendonly
      - "yes"
    healthcheck:
      # 健康检查，确认Redis已经可以响应命令
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:?Set REDIS_PASSWORD in the compose env file}",
          "ping",
        ]
      interval: 5s # 每 5 秒检查一次
      timeout: 3s # 每次检查最多等待 3 秒
      retries: 12 # 最多重试 12 次
      start_period: 5s # Redis 启动较快，给 5 秒缓冲时间

  # 注意：在 Docker Compose 里，redis://...@redis:6379 里的 redis 是服务名。
  # 容器之间不能用 127.0.0.1 互相访问，因为每个容器都有自己的 localhost。
  # redis://:密码@redis:6379 — 无 ACL 用户名时 userinfo 为「空用户 + 密码」

  rest-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: mysql # 后端在Docker网络里通过mysql这个服务名访问Mysql

      # 因为后端是在 Docker 网络内部访问 Redis，不走宿主机端口映射（密码与 redis 服务 requirepass 一致）。
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in the compose env file}@redis:6379

    depends_on:
      mysql:
        # 依赖 Mysql
        condition: service_healthy # 等 MySQL 健康检查通过后再启动后端
      redis:
        # 依赖 Redis
        condition: service_healthy # 等 Redis 健康检查通过后再启动后端
