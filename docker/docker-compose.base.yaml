# 共享定义：与 docker-compose.{yaml,dev,test}.yaml 组合使用（须后接环境文件，后者覆盖同名项）。
# 对外 HTTP 由各环境覆盖层中的 gateway（docker/nginx/gateway*.docker.conf）统一暴露
# `${GATEWAY_HOST_PORT:-2026}`，再按路径转发到 rest-api、pc-portal、pc-admin（/pc-admin/）。
# 示例 dev：pnpm docker:dev 或：
# docker compose --env-file .env.development -f docker/docker-compose.base.yaml -f docker/docker-compose.dev.yaml up -d
#
# mysql 不在此声明 volumes / ports / container_name，避免多环境卷合并时挂载重复路径。
# MySQL 仅在容器网格内提供服务；下方 rest-api 默认 DB_HOST=mysql，无需在宿主安装 MySQL。
# 开发栈默认不把 3306 暴露到宿主（见 docker-compose.dev.yaml）；按需映射端口供宿主工具或「宿主 Node」使用。
# rest-api 不声明 ports / env_file / APP_ENV，由各环境覆盖。

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PWD}
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  rest-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
