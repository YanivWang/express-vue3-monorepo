# -----------------------------------------------------------------------------
# Docker 开发栈网关：单机入口，浏览器访问 ${GATEWAY_HOST_PORT:-2026}，
# Nginx 仅按路径把请求转发到不同 Compose 服务（rest-api / Vite）。
# -----------------------------------------------------------------------------
# upstream 中使用 Compose 服务名，由嵌入式 DNS（127.0.0.11）解析。

worker_processes 1;

events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    upstream rest_api {
        server rest-api:3000;
    }

    upstream pc_portal {
        server pc-portal:5173;
    }

    server {
        listen 2026 default_server;
        listen [::]:2026 default_server;
        server_name _;

        client_max_body_size 100M;

        location /api/ {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /uploads {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.yaml {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api-docs {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ready {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 前端（Vite）与 HMR
        location / {
            proxy_pass http://pc_portal;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            proxy_buffering off;
        }
    }
}
