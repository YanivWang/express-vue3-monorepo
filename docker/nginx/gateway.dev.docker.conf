# -----------------------------------------------------------------------------
# Docker 开发栈网关：单机入口，浏览器访问 ${GATEWAY_HOST_PORT:-2026}，
# Nginx 仅按路径把请求转发到不同 Compose 服务（rest-api / pc-portal / pc-admin）。
# -----------------------------------------------------------------------------
# 反代地址须用「set $upstream_* + proxy_pass http://$upstream_*$request_uri」形式，配合
# http 块内 resolver，在运行时解析 Compose 服务名。若对主机名使用静态 proxy_pass（无变量），
# Nginx 会缓存解析到的容器 IP，pc-admin / rest-api 等重建换 IP 后常见 502（connect refused）。

worker_processes 1;

events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    server {
        listen 2026 default_server;
        listen [::]:2026 default_server;
        server_name _;

        client_max_body_size 100M;

        location /api/ {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /uploads {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.yaml {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api-docs {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ready {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /pc-admin {
            return 302 /pc-admin/;
        }

        # Vite 5174，base=/pc-admin/；须动态解析 pc-admin，避免容器重建后网关仍连旧 IP。
        location ^~ /pc-admin/ {
            set $upstream_pc_admin pc-admin:5174;
            proxy_pass http://$upstream_pc_admin$request_uri;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            proxy_buffering off;
        }

        # 前端（Vite）与 HMR
        location / {
            set $upstream_pc_portal pc-portal:5173;
            proxy_pass http://$upstream_pc_portal$request_uri;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            proxy_buffering off;
        }
    }
}
