# -----------------------------------------------------------------------------
# Docker 生产/测试栈网关：单机入口监听 2026，按路径分发到 rest-api、pc-portal 与 pc-admin（/pc-admin/）。
# -----------------------------------------------------------------------------
# pc-portal 容器内 nginx 仅托管门户 SPA；pc-admin 镜像独立，由网关 `/pc-admin/` 剥离前缀后转发。
# 反代使用变量 + resolver，避免静态 upstream 在容器 IP 变化后长期 502。

worker_processes auto;

events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    server {
        listen 2026 default_server;
        listen [::]:2026 default_server;
        server_name _;

        client_max_body_size 100M;

        location /api/ {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /uploads {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.yaml {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api-docs {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ready {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            set $upstream_rest_api rest-api:3000;
            proxy_pass http://$upstream_rest_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /pc-admin {
            return 302 /pc-admin/;
        }

        # pc-admin 静态站：构建 publicPath=/pc-admin/，容器内资源在根目录；网关剥离前缀后转发
        location ^~ /pc-admin/ {
            rewrite ^/pc-admin/(.*)$ /$1 break;
            set $upstream_pc_admin pc-admin:80;
            proxy_pass http://$upstream_pc_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        location / {
            set $upstream_pc_portal pc-portal:80;
            proxy_pass http://$upstream_pc_portal$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}
