# 生产专用。开发热重载见 docker-compose.dev.yaml（彼此独立，勿双 -f 叠加）。
name: express-demo-02-prod

services:
  mysql:
    image: mysql:8.4
    container_name: express-demo-02-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PWD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1' ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: express-demo-02-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: mysql
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
