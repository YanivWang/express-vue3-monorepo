# 生产覆盖层：必须配合 docker-compose.base.yaml。
# pnpm docker:prod

name: express-demo-02-prod

services:
  mysql:
    container_name: express-demo-02-mysql
    # 不映射 MySQL 到宿主机，仅容器网络内访问（与 dev 不同）
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    container_name: express-demo-02-app
    env_file:
      - ../.env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      PORT: ${PORT:-3000}
    ports:
      - "${APP_HOST_PORT:-3000}:${PORT:-3000}"

volumes:
  mysql_data:
