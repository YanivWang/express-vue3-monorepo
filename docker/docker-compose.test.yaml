# 测试/预发覆盖层：必须配合 docker-compose.base.yaml。生产镜像形态。
# pnpm docker:test
#
# HTTP 网关 `${GATEWAY_HOST_PORT:-2026}`，与 Playwright 默认 baseURL（同端口）一致。

name: express-vue3-monorepo-test

services:
  mysql:
    container_name: express-vue3-monorepo-mysql-test
    volumes:
      - mysql_test_data:/var/lib/mysql

  gateway:
    image: nginx:alpine
    container_name: express-vue3-monorepo-gateway-test
    volumes:
      - ./nginx/${NGINX_GATEWAY_CONF:-gateway.prod.docker.conf}:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_HOST_PORT:-2026}:2026"
    depends_on:
      rest-api:
        condition: service_started
      pc-portal:
        condition: service_started
      pc-admin:
        condition: service_started
    restart: unless-stopped

  rest-api:
    container_name: express-vue3-monorepo-rest-api-test
    env_file:
      - ../.env.test
    environment:
      APP_ENV: test
      NODE_ENV: test
      PORT: "3000"
      TRUST_PROXY: "1"

  pc-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pc-portal
    container_name: express-vue3-monorepo-pc-portal-test
    restart: unless-stopped
    depends_on:
      rest-api:
        condition: service_started

  pc-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pc-admin
      args:
        VITE_ADMIN_BASE: /pc-admin/
        VITE_API_BASE_URL: ""
    container_name: express-vue3-monorepo-pc-admin-test
    restart: unless-stopped
    depends_on:
      rest-api:
        condition: service_started

volumes:
  mysql_test_data:
