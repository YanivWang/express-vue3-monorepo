# yaml-language-server: $schema=https://json.schemastore.org/docker-compose.json
# 开发覆盖层：必须配合 docker-compose.base.yaml。
# 仓库根目录：pnpm docker:dev（使用 --env-file .env.development）
#
# IDE 调试（9229）：追加 -f docker/docker-compose.debug.yaml，或在 Cursor 用「Docker: Attach」配置。
#
# 日志目录（仓库根下 logs/，已在 .gitignore）：
#   - logs/app-dev.log       Node / nodemon 标准输出与错误（tee 追加）
#   - logs/mysql/error.log   mysqld 错误日志（docker/mysql-dev.cnf）

name: express-demo-02-dev

services:
  mysql:
    container_name: express-demo-02-mysql-dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ../logs/mysql:/var/log/mysql
      - ./mysql-dev.cnf:/etc/mysql/conf.d/dev-logging.cnf:ro
    # 仅此栈映射 MySQL（3306:3306）；prod/test 不暴露 MySQL 到宿主机
    ports:
      - "3306:3306"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: express-demo-02-app-dev
    env_file:
      - ../.env.development
    environment:
      APP_ENV: development
      NODE_ENV: development
      PORT: ${PORT:-3000}
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "${APP_HOST_PORT:-3000}:${PORT:-3000}"
      - "9229:9229"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - mkdir -p /app/logs && pnpm dev 2>&1 | tee -a /app/logs/app-dev.log

volumes:
  mysql_dev_data:
  app_node_modules:
