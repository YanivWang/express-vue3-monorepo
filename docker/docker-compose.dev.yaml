# yaml-language-server: $schema=https://json.schemastore.org/docker-compose.json
# 开发覆盖层：必须配合 docker-compose.base.yaml。
# 仓库根目录：pnpm docker:dev（使用 --env-file .env.development）
#
# IDE 调试（9229）：追加 -f docker/docker-compose.debug.yaml，或在 Cursor 用「Docker: Attach」配置。
#
# 统一入口：`docker/nginx/${NGINX_GATEWAY_CONF:-gateway.dev.docker.conf}` 网关监听
# `${GATEWAY_HOST_PORT:-2026}` → rest-api（3000）、pc-portal（Vite 5173）、pc-admin（Vite 5174，`/pc-admin/`）。
# 浏览器仅需访问网关端口；需在网关内对齐时固定 rest-api `PORT=3000`。
#
# 日志目录（仓库根下 logs/，已在 .gitignore）：
#   - logs/rest-api-dev.log   REST API（Node / nodemon）标准输出与错误（tee 追加）
#   - logs/pc-portal-dev.log  pc-portal（Vite）标准输出与错误（tee 追加）
#   - logs/pc-admin-dev.log    pc-admin（Vite）标准输出与错误（tee 追加）
#   - logs/mysql/error.log    mysqld 错误日志（docker/mysql-dev.cnf）
#
# MySQL：仅在容器内运行；rest-api 通过 Compose 注入的 DB_HOST=mysql 连接。默认不映射 3306 到宿主；
# 若要用宿主上的 GUI 客户端连库，或宿主本机跑 pnpm rest-api:dev 且连同一实例，请取消注释下方 ports。

name: vue3-express-monorepo-dev

services:
  mysql:
    container_name: vue3-express-monorepo-mysql-dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ../logs/mysql:/var/log/mysql
      - ./mysql-dev.cnf:/etc/mysql/conf.d/dev-logging.cnf:ro
    ports:
      - "3306:3306"

  gateway:
    image: nginx:alpine
    container_name: vue3-express-monorepo-gateway-dev
    volumes:
      - ./nginx/${NGINX_GATEWAY_CONF:-gateway.dev.docker.conf}:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_HOST_PORT:-2026}:2026"
    depends_on:
      rest-api:
        condition: service_started
      pc-portal:
        condition: service_started
      pc-admin:
        condition: service_started
    restart: unless-stopped

  rest-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: vue3-express-monorepo-rest-api-dev
    env_file:
      - ../.env.development
    environment:
      APP_ENV: development
      NODE_ENV: development
      # 跳过 husky：slim 镜像无 git；Git 钩子应在宿主仓库配置
      HUSKY: "0"
      PORT: "3000"
      CHOKIDAR_USEPOLLING: "1"
      TRUST_PROXY: "1"
    ports:
      - "9229:9229"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - mkdir -p /app/logs && CI=true pnpm install --frozen-lockfile && pnpm rest-api:dev 2>&1 | tee -a /app/logs/rest-api-dev.log

  # Vite（仅容器网格内访问）；网关将 /api 等发往 rest-api，页面与 HMR 发往本容器
  pc-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: vue3-express-monorepo-pc-portal-dev
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      APP_ENV: development
      NODE_ENV: development
      # 跳过 husky：slim 镜像无 git；Git 钩子应在宿主仓库配置
      HUSKY: "0"
      VITE_DEV_PROXY_TARGET: http://rest-api:3000
      # 浏览器入口为网关时，WebSocket HMR 需走宿主可见端口（默认与 GATEWAY_HOST_PORT 一致）
      VITE_DEV_HMR_CLIENT_PORT: ${GATEWAY_HOST_PORT:-2026}
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - mkdir -p /app/logs && CI=true pnpm install --frozen-lockfile && pnpm pc-portal:dev -- --host 2>&1 | tee -a /app/logs/pc-portal-dev.log
    depends_on:
      rest-api:
        condition: service_started

  pc-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: vue3-express-monorepo-pc-admin-dev
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      APP_ENV: development
      NODE_ENV: development
      HUSKY: "0"
      VITE_ADMIN_BASE: /pc-admin/
      VITE_DEV_PROXY_TARGET: http://rest-api:3000
      VITE_DEV_HMR_CLIENT_PORT: ${GATEWAY_HOST_PORT:-2026}
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - mkdir -p /app/logs && CI=true pnpm install --frozen-lockfile && pnpm pc-admin:dev -- --host --port 5174 2>&1 | tee -a /app/logs/pc-admin-dev.log
    depends_on:
      rest-api:
        condition: service_started

volumes:
  mysql_dev_data:
  app_node_modules:
