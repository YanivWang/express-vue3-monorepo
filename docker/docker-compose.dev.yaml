# yaml-language-server: $schema=https://json.schemastore.org/docker-compose.json
# 开发专用：与 docker-compose.yaml 完全独立（无 include / 无双 -f）。
# MySQL 暴露 MYSQL_PORT；app 使用 bind mount + nodemon 热重载。
# 仓库根目录：docker compose --env-file .env -f docker/docker-compose.dev.yaml up -d --build
#
# 日志目录（仓库根下 logs/，已在 .gitignore）：
#   - logs/app-dev.log       Node / nodemon 标准输出与错误（tee 追加）
#   - logs/mysql/error.log   mysqld 错误日志（docker/mysql-dev.cnf；权限问题同上）

name: express-demo-dev

services:
  mysql:
    image: mysql:8.4
    container_name: express-demo-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PWD}
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ../logs/mysql:/var/log/mysql
      - ./mysql-dev.cnf:/etc/mysql/conf.d/dev-logging.cnf:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: express-demo-app-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: mysql
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - mkdir -p /app/logs && pnpm dev 2>&1 | tee -a /app/logs/app-dev.log
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_dev_data:
  app_node_modules:
