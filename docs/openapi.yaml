  /api/uploads:
    post:
      tags: [上传]
      summary: 上传正文配图（多文件）
      description: |
        需 Bearer JWT。`Content-Type: multipart/form-data`，字段名 **`files`**。
        **`files` 单次请求最多 12 个**（multer）；单文件最大 5MB；类型限 jpeg / png / gif / webp。响应体 **`urls`** 可填入 `POST/PUT /api/posts` 的 `images`。未选择文件时 400，正文 `msg` 为「请选择要上传的图片文件（表单字段名 files）」。multer 限流类错误见 `error.middleware.ts`：`LIMIT_FILE_SIZE`→「单文件不超过 5MB」；`LIMIT_FILE_COUNT`→「上传文件数量过多」；`LIMIT_UNEXPECTED_FILE`→「请使用表单字段名 files 上传」。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  maxItems: 12
                  description: 可多选；最多 12 个文件
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImagesSuccess"
        "400":
          description: 未选择文件、类型不符或超出大小/数量限制
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "429":
          description: 触发全局限流（15 分钟窗口内超限等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
