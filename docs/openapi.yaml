      summary: 新建自定义角色
      description: 需 Bearer；**`admin.roles.manage`**。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 64
                slug:
                  type: string
                  pattern: "^[a-z0-9_-]+$"
                  minLength: 1
                  maxLength: 64
                isStaff:
                  type: boolean
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "400":
          description: slug 冲突或校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 无权限（非超级管理员或未授予 roles.manage）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

