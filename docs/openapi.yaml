  /api/posts/{id}:
    get:
      tags: [文章]
      summary: 按 id 获取文章详情
      description: |
        支持可选 Bearer（`optionalAuthMiddleware`）；合法 JWT 时回填 `myVote`、`myFavorited`。
        **已发布**正文每次成功读取会对 `viewCount +1`，作者本人命中默认不累加 PV。
        仍仅 **已发布**文章可对匿名访客返回；未发布对外 404。
      security:
