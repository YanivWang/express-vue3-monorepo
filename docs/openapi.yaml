  /api/posts:
    get:
      tags: [文章]
      summary: 获取已发布文章列表（分页）
      description: |
        可选 Bearer JWT：`optionalAuthMiddleware`；携带合法 JWT 时每条帖子附带 `myVote`、`myFavorited`。
        `sort=latest`（默认）：按创建时间、`id` 降序；`sort=hot`：`commentCount + favoriteCount + likeCount` 降序。
        关键字搜索（`q`/`keyword`）与分类参数互斥，且在搜索模式下强制按最新排序。
        `parentId`/`categoryId`/`page`/`limit` 等与 `schema/post.schema.ts` 一致。
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: parentId
          in: query
          required: false
          description: 一级分类 id；与 categoryId 二选一
          schema:
            type: integer
            minimum: 1
        - name: categoryId
          in: query
          required: false
          description: 二级叶子分类 id；与 parentId 二选一
          schema:
            type: integer
            minimum: 1
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [latest, hot]
            default: latest
        - name: q
          in: query
          required: false
          description: 全站标题/正文关键字；与 parentId/categoryId 互斥
          schema:
            type: string
            maxLength: 200
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListSuccess"
        "400":
          description: 分页或分类筛选参数校验失败（含 parentId 与 categoryId 同传、一级 id 无效等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    post:
      tags: [文章]
      summary: 创建文章
      description: |
        需在请求头携带 Bearer JWT；正文字段见 `schema/post.schema.ts`（`createPostSchema`）。
        **`title` / `content`** 会先经敏感词检测（命中则 **`400`** 且不写库），通过后再服务端 XSS 净化入库（见 `utils/content-safety.ts`）。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "200":
          description: 创建成功（HTTP 200，与项目统一 `success` 响应一致）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePostSuccess"
        "400":
          description: |
            Zod 校验失败；服务层「标题或正文不能为空」；或 **敏感词命中**：`msg` **固定为**「包含敏感言论，请删除敏感言论再试试？」。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                sensitiveWords:
                  summary: 敏感言论拦截
                  value:
                    code: 400
                    msg: 包含敏感言论，请删除敏感言论再试试？
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

