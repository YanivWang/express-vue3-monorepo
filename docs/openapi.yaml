                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非作者且不具备 `admin.posts.delete`
          content:
