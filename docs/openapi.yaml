          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostOneSuccess"
        "400":
          description: 路径 id 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 不存在或未发布（对外统一为文章不存在）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    put:
