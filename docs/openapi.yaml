        需 Bearer；**`admin.comments.read`**。可选筛选 `postId`、`authorId`、`q`。
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: postId
          in: query
          schema: { type: integer, minimum: 1 }
        - name: authorId
          in: query
          schema: { type: integer, minimum: 1 }
        - name: q
          in: query
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCommentsListSuccess"
        "400":
          description: 分页参数非法
