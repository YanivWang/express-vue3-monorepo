        nickname: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        gender: { type: string, nullable: true, description: male / female / unknown }
        birthday: { type: string, nullable: true, description: YYYY-MM-DD }
        bio: { type: string, nullable: true }
        address: { type: string, nullable: true }
        company: { type: string, nullable: true }
        jobTitle: { type: string, nullable: true }
        isMarried: { type: boolean, nullable: true }
        mom: { type: string, nullable: true }
        father: { type: string, nullable: true }
        university: { type: string, nullable: true }
        createdAt: { type: string }
        updatedAt: { type: string }

    GetMyProfileSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [profile]
          properties:
            code: { example: 200 }
            msg: { example: 获取用户扩展资料成功 }
            profile:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/UserProfilePayload"

    PatchUserProfileBody:
      type: object
      description: 部分更新；至少一项；字段可为 null 表示清空（isMarried 等同理）
      properties:
        nickname: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        gender: { type: string, nullable: true }
        birthday: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        address: { type: string, nullable: true }
        company: { type: string, nullable: true }
        jobTitle: { type: string, nullable: true }
        isMarried: { type: boolean, nullable: true }
        mom: { type: string, nullable: true }
        father: { type: string, nullable: true }
        university: { type: string, nullable: true }

    PatchMyProfileSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [profile]
          properties:
            code: { example: 200 }
            msg: { example: 更新用户资料成功 }
            profile:
              $ref: "#/components/schemas/UserProfilePayload"

    AdminPostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取管理端文章列表成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"

    AdminPortalUsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            users:
              type: array
              items:
                type: object
            pagination:
              $ref: "#/components/schemas/PostsListPagination"

    AdminStaffUsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            users:
              type: array
              items:
                type: object
            pagination:
              $ref: "#/components/schemas/PostsListPagination"

    AdminCommentsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comments, pagination]
          properties:
            comments:
              type: array
              items:
                type: object
                description: 扁平评论；含文章标题 `postTitle`、`contentExcerpt` 等（见 `findCommentsPageAdmin`）
            pagination:
              $ref: "#/components/schemas/PostsListPagination"

    PermissionsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [permissions]
          properties:
            permissions:
              type: array
