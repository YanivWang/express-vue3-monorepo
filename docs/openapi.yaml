        若为 **他人的未发布草稿**，须具备 **`admin.posts.write`**；公开规则见 `post.service.ts` `canEdit`。
        **`title` / `content`** 更新时同样走敏感词 + XSS 净化。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePostSuccess"
        "400":
          description: id 非法、请求体校验失败、「没有要更新的字段」或 **敏感言论拦截**
