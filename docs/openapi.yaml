  /api/posts:
    get:
      tags: [文章]
      summary: 获取已发布文章列表（分页）
      description: |
        可选 Bearer JWT：`optionalAuthMiddleware`；携带合法 JWT 时每条帖子附带 `myVote`、`myFavorited`。
        `sort=latest`（默认）：按创建时间、`id` 降序；`sort=hot`：`commentCount + favoriteCount + likeCount` 降序。
        关键字搜索（`q`/`keyword`）与分类参数互斥，且在搜索模式下强制按最新排序。
        `parentId`/`categoryId`/`page`/`limit` 等与 `schema/post.schema.ts` 一致。
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: parentId
          in: query
          required: false
          description: 一级分类 id；与 categoryId 二选一
          schema:
            type: integer
            minimum: 1
        - name: categoryId
          in: query
          required: false
          description: 二级叶子分类 id；与 parentId 二选一
          schema:
            type: integer
            minimum: 1
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [latest, hot]
            default: latest
        - name: q
          in: query
          required: false
          description: 全站标题/正文关键字；与 parentId/categoryId 互斥
          schema:
            type: string
            maxLength: 200
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
