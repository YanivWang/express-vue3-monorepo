        - type: object
          required: [roles]
          properties:
            roles:
              type: array
              items:
                type: object

    StaffRoleOptionsSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [roles]
          properties:
            roles:
              type: array
              items:
                type: object

    CreateLeafCategoryPortalBody:
      type: object
      required: [parentId, name]
      properties:
        parentId:
          type: integer
          minimum: 1
          description: 一级分类 id（根节点）
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: 二级叶子名称
        sortOrder:
          type: integer
          description: 可选整数，默认 0

paths:
  /health:
    get:
      tags: [探针]
      summary: 存活检查
      description: 不访问数据库；在 `app.ts` 中先于全局限流挂载，不经全局限流计数。
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthLiveness"

  /ready:
    get:
      tags: [探针]
      summary: 就绪检查
      description: |
        并行探测 **MySQL**（`sequelize.authenticate()`）与 **Redis**（`PING`）；二者均为 ok 时 HTTP 200，否则 **503**。
        在 `app.ts` 中先于全局限流挂载，不经全局限流计数。响应体见 `ReadinessOk` / `ReadinessFail`（含 `checks.mysql` / `checks.redis`）。
      responses:
        "200":
          description: MySQL 与 Redis 均可连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessOk"
        "503":
          description: MySQL 或 Redis 不可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessFail"

  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: Zod 或业务校验失败（如用户名为空、超长；`msg` 可能为多条信息用 `; ` 拼接）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                empty:
                  value:
                    code: 400
                    msg: 用户名不能为空
        "409":
          description: 冲突 — 用户名已被占用（Sequelize `UniqueConstraintError`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 409
                msg: 用户名已存在
        "429":
          description: 登录/注册路由限流（1 分钟内超过 60 次）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 429
                msg: 请求过于频繁，请稍后再试
        "500":
          description: 服务端异常（未标记 `expose` 时为「服务器内部错误」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 登录成功，返回 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 凭证无效（用户名或密码错误；不区分是否在册）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 401
                msg: 用户名或密码错误
        "429":
          description: 登录/注册路由限流（1 分钟内超过 60 次）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 429
                msg: 请求过于频繁，请稍后再试
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/me:
    get:
      tags: [当前用户]
      summary: 获取当前登录用户资料与 RBAC 权限快照
      description: |
        需在请求头携带 Bearer JWT。成功时 `data.user` 含公开资料（`id`、`username`、`avatar`）、**`nickname`**（来自 UserProfiles，无则为 null）及 **`roleId`**、**`roleSlug`**、**`permissions`**（当前角色被授予的权限码）。
        菜单与按钮显隐应以后端返回的 `permissions` 为准；JWT 内 `roleId`/`roleSlug` 仅为载荷提示。
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserSuccess"
        "401":
          description: 未携带或无效 JWT，或库中用户已不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/me/profile:
    get:
      tags: [当前用户]
      summary: 获取当前用户扩展资料（UserProfiles 全量）
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功；尚无资料行时 `profile` 为 null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMyProfileSuccess"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    patch:
      tags: [当前用户]
      summary: 部分更新当前用户扩展资料（upsert）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserProfileBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchMyProfileSuccess"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads:
    post:
      tags: [上传]
      summary: 上传富文本插图（多文件）
      description: |
        需 Bearer JWT。`Content-Type: multipart/form-data`，字段名 **`files`**。
        **`files` 单次请求最多 9 个**（multer）；单文件最大 8MB；类型限 jpeg / png / gif / webp。**落盘 **`uploads/posts/<年>/<月>/`**，响应 URL 为 **`/uploads/posts/<年>/<月>/<文件名>`**，供富文本正文 `<img src>` 引用。**
        **头像请走 `POST /api/uploads/profiles`。**
        未选择文件时 400，正文 `msg` 为「请选择要上传的图片文件（表单字段名 files）」。multer 限流类错误见 `error.middleware.ts`：`LIMIT_FILE_SIZE`→「单文件大小超出限制」；`LIMIT_FILE_COUNT`→「上传文件数量过多」；`LIMIT_UNEXPECTED_FILE`→「请使用表单字段名 files 上传」。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  maxItems: 9
                  description: 可多选；最多 9 个文件
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImagesSuccess"
        "400":
          description: 未选择文件、类型不符或超出大小/数量限制
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "429":
          description: 触发全局限流（15 分钟窗口内超限等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 429
                msg: 请求过于频繁，请稍后再试
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/profiles:
    post:
      tags: [上传]
      summary: 上传用户头像（单文件）
      description: |
        需 Bearer JWT。`multipart/form-data`，字段名 **`files`**。
        **`files` 单次仅 1 个**；单文件最大 8MB；类型限 jpeg / png / gif / webp。
        文件落盘 **`uploads/profiles/<年>/<月>/`**；响应 **`urls`** 形如 **`/uploads/profiles/<年>/<月>/<文件名>`**，可写入 **`User.avatar`**、`PATCH /api/admin/portal-users/{id}`、`PATCH /api/admin/staff/{id}` 等中的 `avatar`。
        其它语义与 `POST /api/uploads` 相同（未选文件、超限等错误信息一致）。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  maxItems: 1
                  minItems: 1
                  description: 单文件；字段名 files
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImagesSuccess"
        "400":
          description: 未选择文件、类型不符或超出大小/数量限制
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "429":
          description: 触发全局限流（15 分钟窗口内超限等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 429
                msg: 请求过于频繁，请稍后再试
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/large/init:
    post:
      tags: [上传]
      summary: 大文件分片上传 — 创建任务或秒传
      description: |
        需 Bearer。JSON body：`fileName`、`fileSize`、`chunkSize`（1～8MB）、可选 `mimeType`、可选 `fileMd5`（32 位 hex，小写）。
        若携带 `fileMd5` 且与 `fileSize` 命中服务端**全局**已合并索引，则返回 `instant: true` 与 `publicUrl`，无需再传分片。
        否则返回 `instant: false` 与 `uploadId`；分片目录为 `uploads/chunks-temp/<fileMd5>/<uploadId>/`（未传 `fileMd5` 时为 legacy `uploads/chunks-temp/<uploadId>/`）。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LargeUploadInitBody"
      responses:
        "200":
          description: 成功（秒传或已创建任务）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LargeUploadInitSuccess"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/large/{uploadId}/status:
    get:
      tags: [上传]
      summary: 大文件上传任务状态（断点续传）
      description: |
        返回 **`status`**、**`chunkTotal`**、已落地分片下标 **`receivedIndices`**；**done** 时含 **`publicUrl`**。
        未结束前另含 **`fileName`** / **`fileSize`** / **`chunkSize`**。非任务所有者 **403**；元数据不存在 **404**；超过 TTL **410**。
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LargeUploadStatusSuccess"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非任务所有者
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 任务不存在或已清理
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "410":
          description: 任务已过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/large/{uploadId}/chunks/{chunkIndex}:
    put:
      tags: [上传]
      summary: 上传单个分片
      description: |
        multipart/form-data，字段名 **chunk**；须同时携带 **X-Chunk-Md5**（当前分片二进制内容的 32 位 hex MD5，大小写均可），服务端校验尺寸、内容与声明 MD5 一致。
        单分片二进制 **≤ 8MB**；须与 init 时 **`chunkSize`** 及最后一片的尾片大小规则一致。合并进行中 **409**、任务已完成 **409**、非所有者 **403**、已过期 **410**。
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Chunk-Md5
          in: header
          required: true
          description: 本分片内容的 MD5（32 位十六进制，与表单 chunk 字节一致）
          schema:
            type: string
            pattern: ^[a-fA-F0-9]{32}$
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 1999
            description: 与 init 时 `chunkTotal` 对齐，最大 **1999**（总分片 ≤ **2000**）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [chunk]
              properties:
                chunk:
                  type: string
                  format: binary
      responses:
        "200":
          description: 分片已接收
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LargeUploadChunkSuccess"
        "400":
          description: 缺 file、分片越界、尺寸或 MD5 不符等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非任务所有者
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "409":
          description: 正在合并或任务已结束等互斥状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "410":
          description: 任务已过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/large/{uploadId}/merge:
    post:
      tags: [上传]
      summary: 合并分片
      description: |
        所有分片就绪后合并为成品，写入 **`/uploads/large/...`**。响应 **`merged`** 区分是否本次执行合并。
        非所有者 **403**；合并冲突或分片未齐全 **409**；过期 **410**。
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 合并完成或已完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LargeUploadMergeSuccess"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非任务所有者
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "409":
          description: 正在合并、分片缺失或未就绪等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "410":
          description: 任务已过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 合并后校验失败等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads/large/{uploadId}:
    delete:
      tags: [上传]
      summary: 取消大文件上传任务
      description: 删除临时分片与会话；任务不存在时亦为 **200**（幂等）。非所有者 **403**。
      security:
        - bearerAuth: []
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 已取消（或任务本不存在）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非任务所有者
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/categories:
    get:
      tags: [分类]
      summary: 获取两级分类树
      description: |
        无需 JWT。一级根节点（`parentId` 为 null），`children` 为同级排序后的二级叶子；响应节点含 `sortOrder`。与数据库种子或自建数据一致。
      responses:
