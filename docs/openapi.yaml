          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCommentSuccess"
        "400":
          description: 路径参数格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT（含 service 中用户记录缺失时的「未登录或登录已过期」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非评论作者且非文章作者且非管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
