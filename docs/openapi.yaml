# 接口契约：可提交仓库，团队共用；运行时可 GET /openapi.yaml（与 apps/backend/rest-api/src/swagger.ts 一致）；Swagger UI：/api-docs。Apifox 可导入本文件。
openapi: 3.0.3
info:
  title: express-vue3-monorepo · REST API（@express-vue3-monorepo/rest-api）
  version: 1.0.0
  description: |
    后端包 `apps/backend/rest-api`（Express ESM + TypeScript）；业务路由挂载于 `/api`，与 `src/app.ts`、`src/routes/*.routes.ts` 一致。
    - 文档：`GET /openapi.yaml`（YAML 原文）、`GET /api-docs`（Swagger UI）；契约源文件为仓库根 `docs/openapi.yaml`，由 `src/swagger.ts` 加载。
    - 安全与传输：`helmet`（`/api-docs` 路径关闭 CSP 以便 Swagger UI）；`cors` 行为见 `src/env.ts`（生产须配置 `CORS_ORIGINS`）。较大 JSON 响应可能经 `compression.middleware.ts` 压缩（`Content-Encoding: gzip` 等）。
    - 追踪：`requestId.middleware.ts` 写入响应头 **`X-Request-Id`**；客户端可传入同名请求头透传（最长 128 字符）。
    - 限流（`middlewares/rateLimit.middleware.ts`）：`/health`、`/ready` 与 **GET `/uploads/...` 静态** 在 `src/app.ts` 中先于全局限流挂载，故 **15 分钟窗口计数不作用于这些路径**；限流器内对 `/health`、`/ready` 的 `skip` 为兜底。其余进入全局限流的 API **15 分钟 / 最多 100 次**，超限 HTTP 429，`msg` 为「请求过于频繁，请稍后再试」。`POST /api/register`、`POST /api/login` 另挂载 **1 分钟 / 最多 5 次**。
    - 认证：`POST /api/register`、`POST /api/login` 无需登录。注册/登录请求体校验见 `src/schema/auth.schema.ts`（用户名 trim 后长度 2～100；密码 6～100）；用户更新接口见 `src/schema/user.schema.ts`（username/password 规则与注册不同）。
    - 用户：`src/routes/user.routes.ts` 在需登录的路由上挂载 `authMiddleware`，请求头须携带 `Authorization: Bearer <JWT>`。
    - 分类：`GET /api/categories` 公开；返回两级树，节点含 `id`、`name`、`parentId`、`sortOrder`，根的 `children` 为二级叶子。文章创建时 `categoryId` 必须为二级叶子 id；`GET /api/posts` 可选 `parentId`（一级 id）或 `categoryId`（叶子 id），二者不得同传。
    - 上传：`POST /api/uploads` 需 Bearer；`multipart/form-data` 字段名 `files`，**单次最多 12 个文件**，单文件最大 5MB，类型 jpeg/png/gif/webp；响应 `urls` 可写入文章 `images`。静态访问 `GET /uploads/...`（不走 API 全局限流）。
    - 文章：`Post.images` 为 URL 字符串数组（最多 24 条，须为 `/uploads/` 前缀）。`GET /api/posts` 公开分页（仅 `published: true`）；`GET /api/posts/{id}` 未挂载可选 JWT，`findPostByIdPublic` 的访问者恒为匿名，**未发布文章对任意客户端（含作者）均返回 404**；`POST /api/posts/{postId}/comments` 校验文章时传入**当前登录用户 id**，故 **作者仍可对本人的未发布文章发表评论**（与详情 GET 行为不一致，以 controller/service 为准）。`GET /api/posts/mine/list` 及创建/更新/删除需 Bearer；更新/删除须为作者或 `role === 1` 的管理员。
    - 评论：`GET /api/posts/{postId}/comments` 挂载 `optionalAuthMiddleware`；`POST` 发评与 `DELETE` 删评需 Bearer；删除限评论作者、文章作者或管理员。
    - 参数校验：`middlewares/validate.middleware.ts` + Zod；失败时 HTTP 400，`msg` 为多条校验信息以 `; ` 拼接。
    - 未匹配路由：全局 404，`msg` 为「接口不存在」。
    - `GET /api/users`：`page`、`limit` 缺省 1、10，`limit` 最大 100；响应含 `users` 与 `pagination`。
    - `GET /api/posts`、`GET /api/posts/mine/list`：分页与同上分类筛选参数；响应含 `posts` 与 `pagination`。
    - `GET /api/posts/{postId}/comments`：`page`、`limit` 缺省 1、20，`limit` 最大 100；顶层评论按 id 降序分页，每条含 `replies`（直接回复、按 id 升序）。删文章时评论随 Post 关联 `ON DELETE CASCADE`。

servers:
  - url: http://127.0.0.1:{gw}
    description: |
      Docker Compose Nginx 统一入口（GATEWAY_HOST_PORT，默认 2026）；与浏览器访问 `/`、`/api/...`、`/api-docs` 同源。
    variables:
      gw:
        default: "2026"
        description: 网关宿主端口（环境变量 GATEWAY_HOST_PORT）

  - url: http://127.0.0.1:{port}
    description: |
      直连 `pnpm rest-api:dev` 或宿主映射到后端时，`port` 与进程环境变量 PORT 一致（缺省 3000）。
    variables:
      port:
        default: "3000"
        description: 应用监听端口（环境变量 PORT）

tags:
  - name: 探针
    description: 存活 / 就绪检查（在 app 中先于全局限流挂载，不经限流计数）
  - name: 认证
    description: 注册与登录（无需 Bearer）
  - name: 用户
    description: 用户列表与单条查询、更新、删除（需 Bearer JWT）
  - name: 文章
    description: 文章列表、详情、我的文章与增删改（部分接口需 Bearer JWT）
  - name: 分类
    description: 两级分类树（公开 GET）
  - name: 上传
    description: 正文配图多文件上传（需 Bearer JWT）
  - name: 评论
    description: 文章下的评论列表、发表与删除（列表可选 Bearer，发评/删评需 Bearer JWT）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "登录接口返回的 JWT；请求头 Authorization 为「Bearer」+ 空格 + token。过期或未携带返回 401。"

  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码；本服务错误响应中与 HTTP 状态码一致（如 400/401/404/409/500）。
        msg:
          type: string
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg, token]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: "JWT（jsonwebtoken）；`jwt.verify` 结果写入 `req.user`，payload 含 id、username；签发 expiresIn 7d。"
    CredentialsBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: trim，长度 2～100 字符（与 `schema/auth.schema.ts` 中 `credentialsBodySchema` 一致）
          minLength: 2
          maxLength: 100
        password:
          type: string
          description: trim，长度 6～100 字符
          minLength: 6
          maxLength: 100
    UserItem:
      type: object
      description: Sequelize 用户行序列化结果；当前实现未剔除 password 字段
      properties:
        id:
          type: integer
        username:
          type: string
        password:
          type: string
          description: bcrypt 哈希（接口当前会一并返回）
        avatar:
          type: string
          nullable: true
          description: 头像 URL 或路径
        role:
          type: integer
          description: "0 普通用户，1 管理员（与 User 模型一致）"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    HealthLiveness:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ReadinessOk:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready
    ReadinessFail:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: not_ready
        message:
          type: string
          example: database unavailable
    UsersListPagination:
      type: object
      description: 与 `user.controller#getUsers` 返回的 `pagination` 字段一致
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          description: 当前页码（从 1 开始）
          minimum: 1
          example: 1
        limit:
          type: integer
          description: 每页条数（最大 100，与 Zod schema 一致）
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          description: 用户总条数
          minimum: 0
        totalPages:
          type: integer
          description: 总页数；无数据时为 0
          minimum: 0
        hasNext:
          type: boolean
          description: 是否还有下一页
    UsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户列表成功
            users:
              type: array
              items:
                $ref: "#/components/schemas/UserItem"
            pagination:
              $ref: "#/components/schemas/UsersListPagination"
    UserOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [user]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户成功
            user:
              $ref: "#/components/schemas/UserItem"
    UpdateUserBody:
      type: object
      description: 与 `schema/user.schema.ts` 中 `userBodySchema` 一致（非注册 credential 规则）
      required: [username, password]
      properties:
        username:
          type: string
          description: 新用户名；trim，非空，最多 100 字符
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 明文新密码；trim，非空，最多 100 字符；服务端 bcrypt 后写入
          minLength: 1
          maxLength: 100
    UpdateUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 更新用户成功
    DeleteUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除用户成功

    PostAuthor:
      type: object
      description: 文章关联作者；与 `services/post.service.ts` 中 `authorAttributes` 一致
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: string
          nullable: true
          description: 头像 URL 或路径，可为 null
    PostCategory:
      type: object
      description: 文章所属叶子分类（id/name）；与 `services/post.service.ts` 中 `categoryAttributes` 一致
      properties:
        id:
          type: integer
        name:
          type: string
    CategoryTreeNode:
      type: object
      description: 分类节点；根节点含 `children` 为二级列表，叶子无 `children`
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
          nullable: true
        sortOrder:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTreeNode"
    CategoriesListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [categories]
          properties:
            code:
              example: 200
            msg:
              example: 获取分类成功
            categories:
              type: array
              items:
                $ref: "#/components/schemas/CategoryTreeNode"
    PostItem:
      type: object
      description: Sequelize Post 行序列化结果，含嵌套 `author` 与 `category`
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
        authorId:
          type: integer
        categoryId:
          type: integer
          description: 所属二级（叶子）分类 id
        images:
          type: array
          description: 正文配图路径列表，与 `POST /api/uploads` 返回及入库规则一致
          items:
            type: string
            example: "/uploads/2026/05/1712345678901-a1b2c3d4e5f67890.jpg"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
        category:
          $ref: "#/components/schemas/PostCategory"
        commentCount:
          type: integer
          minimum: 0
          description: 评论条数（含回复）
        favoriteCount:
          type: integer
          minimum: 0
        likeCount:
          type: integer
          minimum: 0
        dislikeCount:
          type: integer
          minimum: 0
        viewCount:
          type: integer
          minimum: 0
          description: 阅读次数 PV（仅在详情接口成功读取已发布正文时递增；作者浏览自身文章默认不计）
        myVote:
          type: string
          nullable: true
          enum: [like, dislike]
          description: 当前登录用户对本文的立场；匿名或未投票时通常为 null（列表在无 JWT 时可省略字段）
        myFavorited:
          type: boolean
          description: 当前登录用户是否已收藏；匿名时可省略字段
    PostsListPagination:
      type: object
      description: 与文章列表接口返回的 `pagination` 一致（结构与用户分页相同）
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
    PostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章列表成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    MyPostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取我的文章成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    PostOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    CreatePostBody:
      type: object
      required: [title, content, categoryId]
      properties:
        title:
          type: string
          description: trim，非空，最多 200 字符（与 `schema/post.schema.ts` 一致）
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: trim，非空
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 必须为二级叶子分类 id（见 `GET /api/categories`）
        published:
          type: boolean
          description: 可选；缺省由服务端处理（当前实现为 `Boolean(payload.published)`，未传则为 false）
        images:
          type: array
          description: 可选；缺省为 `[]`。每项须为 `/uploads/` 开头的本站路径（见上传接口）
          maxItems: 24
          items:
            type: string
    UpdatePostBody:
      type: object
      description: 部分更新；至少提供一个字段（否则服务端 400「没有要更新的字段」）
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 可选；若传则须为二级叶子分类 id
        published:
          type: boolean
        images:
          type: array
          maxItems: 24
          items:
            type: string
    CreatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 创建文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    UpdatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 更新文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    DeletePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除文章成功

    UploadImagesSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [urls]
          properties:
            code:
              example: 200
            msg:
              example: 上传成功
            urls:
              type: array
              description: 可写入文章 `images` 的公开路径（`/uploads/年/月/文件名`）
              items:
                type: string

    CommentReplyItem:
      type: object
      description: 单条评论（含嵌套回复时不含 `replies` 字段）；与 Sequelize 序列化一致
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: integer
        parentId:
          type: integer
          nullable: true
          description: 顶层为 null；回复时为父评论 id
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
    CommentThreadItem:
      allOf:
        - $ref: "#/components/schemas/CommentReplyItem"
        - type: object
          properties:
            replies:
              type: array
              description: 仅列表接口顶层评论含此字段；该顶层下的全部直接回复（按 id 升序，`services/comment.service.ts` 不再截断条数）
              items:
                $ref: "#/components/schemas/CommentReplyItem"
    CommentsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comments, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取评论列表成功
            comments:
              type: array
              items:
                $ref: "#/components/schemas/CommentThreadItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    CreateCommentBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: trim，非空，最长 5000 字符（与 `schema/comment.schema.ts` 一致）
          minLength: 1
          maxLength: 5000
        parentId:
          type: integer
          minimum: 1
          description: 可选；回复时传入父评论 id，且该评论须属于路径中的文章。可与 `schema/comment.schema.ts` 中逻辑一致地传字符串数字或 `null`（视为未回复）。
    CreateCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comment]
          properties:
            code:
              example: 200
            msg:
              example: 发表评论成功
            comment:
              $ref: "#/components/schemas/CommentReplyItem"
    DeleteCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除评论成功

paths:
  /health:
    get:
      tags: [探针]
      summary: 存活检查
      description: 不访问数据库；在 `app.ts` 中先于全局限流挂载，不经全局限流计数。
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthLiveness"

  /ready:
    get:
      tags: [探针]
      summary: 就绪检查
      description: 尝试 `sequelize.authenticate()`；在 `app.ts` 中先于全局限流挂载，不经全局限流计数。
      responses:
        "200":
          description: 数据库可连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessOk"
        "503":
          description: 数据库不可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessFail"

  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: Zod 或业务校验失败（如用户名为空、超长；`msg` 可能为多条信息用 `; ` 拼接）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                empty:
                  value:
                    code: 400
                    msg: 用户名不能为空
        "409":
          description: 冲突 — 用户名已被占用（Sequelize `UniqueConstraintError`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 409
                msg: 用户名已存在
        "429":
