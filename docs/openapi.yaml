# 接口契约：可提交仓库，团队共用；Apifox 选择「导入」→ OpenAPI → 本文件（文档地址一般为 http://localhost:<PORT>/openapi.yaml，PORT 缺省 3000）。
openapi: 3.0.3
info:
  title: express-demo-02 · Express ESM 接口文档
  version: 1.2.0
  description: |
    项目 express-demo-02；注册、登录与用户管理路由与 `src/app.js`、`src/routes/*.routes.js` 一致。
    - 认证：`POST /api/register`、`POST /api/login` 无需登录。
    - 用户：`src/routes/user.routes.js` 在路由级挂载 `authMiddleware`，须在请求头携带 `Authorization: Bearer <JWT>`（登录成功返回的 token）。
    - 参数校验：`validate.middleware.js` + Zod schema；失败时 HTTP 400，`msg` 为多条校验信息的英文分号拼接。
    - 未匹配路由：全局 404，`msg` 为「接口不存在」。
    - `GET /api/users` 使用 `findUsersPage`：`page`、`limit` 经 `getUsersSchema` 校验（缺省 1、10，`limit` 最大 100）；响应含当前页 `users` 与 `pagination`（total、totalPages、hasNext 等）。

servers:
  - url: http://localhost:{port}
    description: |
      端口与进程环境变量 PORT 一致（缺省 3000）。Docker Compose 下宿主机侧为 APP_HOST_PORT → 容器 PORT。
      导入 Apifox 时可在 server variables 中改 port。
    variables:
      port:
        default: "3000"
        description: 应用监听端口（环境变量 PORT）

tags:
  - name: 认证
    description: 注册与登录（无需 Bearer）
  - name: 用户
    description: 用户列表与单条查询、更新、删除（需 Bearer JWT）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "登录接口返回的 JWT；请求头 Authorization 为「Bearer」+ 空格 + token。过期或未携带返回 401。"

  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码；本服务错误响应中与 HTTP 状态码一致（如 400/401/404/409/500）。
        msg:
          type: string
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: "JWT（jsonwebtoken）；payload 含 id、username；签发使用 expiresIn 7d。"
    CredentialsBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 非空，trim，最长 100 字符（与 `src/schema/auth.schema.js` 一致）
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 非空，trim，最长 100 字符
          minLength: 1
          maxLength: 100
    UserItem:
      type: object
      description: Sequelize 用户行序列化结果；当前实现未剔除 password 字段
      properties:
        id:
          type: integer
        username:
          type: string
        password:
          type: string
          description: bcrypt 哈希（接口当前会一并返回）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UsersListPagination:
      type: object
      description: 与 `user.controller#getUsers` 返回的 `pagination` 字段一致
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          description: 当前页码（从 1 开始）
          minimum: 1
          example: 1
        limit:
          type: integer
          description: 每页条数（最大 100，与 Zod schema 一致）
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          description: 用户总条数
          minimum: 0
        totalPages:
          type: integer
          description: 总页数；无数据时为 0
          minimum: 0
        hasNext:
          type: boolean
          description: 是否还有下一页
    UsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户列表成功
            users:
              type: array
              items:
                $ref: "#/components/schemas/UserItem"
            pagination:
              $ref: "#/components/schemas/UsersListPagination"
    UserOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [user]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户成功
            user:
              $ref: "#/components/schemas/UserItem"
    UpdateUserBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 新用户名；trim，非空，最多 100 字符
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 明文新密码；trim，非空，最多 100 字符；服务端 bcrypt 后写入
          minLength: 1
          maxLength: 100
    UpdateUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 更新用户成功
    DeleteUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除用户成功

paths:
  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: Zod 或业务校验失败（如用户名为空、超长；`msg` 可能为多条信息用 `; ` 拼接）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                empty:
                  value:
                    code: 400
                    msg: 用户名不能为空
        "409":
          description: 冲突 — 用户名已被占用（Sequelize `UniqueConstraintError`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 409
                msg: 用户名已存在
        "500":
          description: 服务端异常（未标记 `expose` 时为「服务器内部错误」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 登录成功，返回 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 凭证无效（用户名或密码错误；不区分是否在册）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 401
                msg: 用户名或密码错误
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/users:
    get:
      tags: [用户]
      summary: 获取用户列表
      description: |
        需在请求头携带 Bearer JWT。
        查询参数 `page`、`limit` 由 `getUsersSchema` 校验：缺省分别为 `1`、`10`；须为正整数；`limit` 不超过 100。
        列表按用户 `id` 升序分页；响应体含 `users`（当前页）与 `pagination`（total、totalPages、hasNext）。
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 页码，缺省 1；正整数
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: 每页条数，缺省 10；正整数，最大 100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListSuccess"
        "400":
          description: 分页等参数校验失败（如非正整数）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT（`msg` 为「未登录或登录已过期」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/getOneUser:
    get:
      tags: [用户]
      summary: 按查询参数获取单个用户
      description: |
        `GET /api/getOneUser?id=1`。查询参数 `id` 必填，须为不含前导零的正整数字符串（与 `user.schema.js` 中 `idSchema` 一致，如 `1` 合法，`01` 不合法）。
        需 Bearer JWT。成功响应与 `GET /api/users/{id}` 相同。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: 用户主键字符串，匹配 `^[1-9]\d*$`
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOneSuccess"
        "400":
          description: 缺少或非法 `id`、或其它 Zod 校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/users/{id}:
    get:
      tags: [用户]
      summary: 按路径主键获取单个用户
      description: |
        路径参数 `id` 为不含前导零的正整数字符串。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 用户主键，匹配 `^[1-9]\d*$`（Express 以字符串传入 Zod）
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOneSuccess"
        "400":
          description: 路径 `id` 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

    put:
      tags: [用户]
      summary: 按主键更新用户
      description: |
        请求体须提供 username、password（长度与注册一致）；密码会重新 bcrypt 后入库。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserSuccess"
        "400":
          description: 参数校验失败（Zod 或 service 层「用户名或密码不能为空」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

    delete:
      tags: [用户]
      summary: 按主键删除用户
      description: 先 `findByPk` 再 `destroy`。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserSuccess"
        "400":
          description: 路径 `id` 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
