# 接口契约：可提交仓库，团队共用；Apifox 选择「导入」→ OpenAPI → 本文件（文档地址一般为 http://localhost:<PORT>/openapi.yaml，PORT 缺省 3000）。
openapi: 3.0.3
info:
  title: express-demo-02 · Express ESM 接口文档
  version: 1.7.0
  description: |
    项目 express-demo-02；注册、登录、用户、文章、分类、图片上传与评论路由与 `src/app.js`、`src/routes/*.routes.js` 一致。
    - 认证：`POST /api/register`、`POST /api/login` 无需登录。
    - 用户：`src/routes/user.routes.js` 在路由级挂载 `authMiddleware`，须在请求头携带 `Authorization: Bearer <JWT>`（登录成功返回的 token）。
    - 分类：`GET /api/categories` 公开；返回两级树（仅 `id`/`name`，根为一级、children 为二级叶子）。文章创建时 `categoryId` 必须为二级叶子 id；`GET /api/posts` 可选 `parentId`（一级 id）或 `categoryId`（叶子 id），二者不得同传。
    - 上传：`POST /api/uploads` 需 Bearer；`multipart/form-data` 字段名 `files`（可多文件），单文件最大 5MB，类型 jpeg/png/gif/webp；响应 `urls` 为可写入文章 `images` 的 `/uploads/...` 路径。静态访问 `GET /uploads/...`。
    - 文章：`Post.images` 为配图 URL 字符串数组（最多 24 条，须为 `/uploads/` 前缀）；无独立 slug/摘要字段。`src/routes/post.routes.js` — `GET /api/posts` 公开分页（仅 `published: true`）；`GET /api/posts/{id}` 公开读详情；`GET /api/posts/mine/list` 及创建/更新/删除需 Bearer；更新/删除须为作者或 `role === 1` 的管理员。
    - 评论：`src/routes/comment.routes.js` — `GET /api/posts/{postId}/comments` 挂载 `optionalAuthMiddleware`，无 token 不报错；有合法 Bearer 时 `req.user` 可用于文章可见性（作者可访问自己未发布文章下的评论列表）。`POST` 发评与 `DELETE` 删评需 Bearer；删除限评论作者、文章作者或管理员（`role === 1`）。
    - 参数校验：`validate.middleware.js` + Zod schema；失败时 HTTP 400，`msg` 为多条校验信息的英文分号拼接。
    - 未匹配路由：全局 404，`msg` 为「接口不存在」。
    - `GET /api/users` 使用 `findUsersPage`：`page`、`limit` 经 `getUsersSchema` 校验（缺省 1、10，`limit` 最大 100）；响应含当前页 `users` 与 `pagination`（total、totalPages、hasNext 等）。
    - `GET /api/posts`、`GET /api/posts/mine/list`：`page`、`limit` 与可选 `parentId`/`categoryId` 经 `listPostsSchema` / `listMyPostsSchema`（缺省 1、10，`limit` 最大 100）；响应含 `posts` 与 `pagination`。
    - `GET /api/posts/{postId}/comments`：`page`、`limit` 经 `listCommentsSchema`（缺省 1、20，`limit` 最大 100）；列表仅顶层评论（`parentId` 为 null），按 id 降序分页；每条含嵌套 `replies`（该层下全部直接回复、按 id 升序）；删文章时评论随 `postId` 外键 `ON DELETE CASCADE` 一并删除（见 `Comment`→`Post` 关联）。

servers:
  - url: http://localhost:{port}
    description: |
      端口与进程环境变量 PORT 一致（缺省 3000）。Docker Compose 下宿主机侧为 APP_HOST_PORT → 容器 PORT。
      导入 Apifox 时可在 server variables 中改 port。
    variables:
      port:
        default: "3000"
        description: 应用监听端口（环境变量 PORT）

tags:
  - name: 认证
    description: 注册与登录（无需 Bearer）
  - name: 用户
    description: 用户列表与单条查询、更新、删除（需 Bearer JWT）
  - name: 文章
    description: 文章列表、详情、我的文章与增删改（部分接口需 Bearer JWT）
  - name: 分类
    description: 两级分类树（公开 GET）
  - name: 上传
    description: 正文配图多文件上传（需 Bearer JWT）
  - name: 评论
    description: 文章下的评论列表、发表与删除（列表可选 Bearer，发评/删评需 Bearer JWT）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "登录接口返回的 JWT；请求头 Authorization 为「Bearer」+ 空格 + token。过期或未携带返回 401。"

  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码；本服务错误响应中与 HTTP 状态码一致（如 400/401/404/409/500）。
        msg:
          type: string
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: "JWT（jsonwebtoken）；payload 含 id、username；签发使用 expiresIn 7d。"
    CredentialsBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 非空，trim，最长 100 字符（与 `src/schema/auth.schema.js` 一致）
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 非空，trim，最长 100 字符
          minLength: 1
          maxLength: 100
    UserItem:
      type: object
      description: Sequelize 用户行序列化结果；当前实现未剔除 password 字段
      properties:
        id:
          type: integer
        username:
          type: string
        password:
          type: string
          description: bcrypt 哈希（接口当前会一并返回）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UsersListPagination:
      type: object
      description: 与 `user.controller#getUsers` 返回的 `pagination` 字段一致
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          description: 当前页码（从 1 开始）
          minimum: 1
          example: 1
        limit:
          type: integer
          description: 每页条数（最大 100，与 Zod schema 一致）
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          description: 用户总条数
          minimum: 0
        totalPages:
          type: integer
          description: 总页数；无数据时为 0
          minimum: 0
        hasNext:
          type: boolean
          description: 是否还有下一页
    UsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户列表成功
            users:
              type: array
              items:
                $ref: "#/components/schemas/UserItem"
            pagination:
              $ref: "#/components/schemas/UsersListPagination"
    UserOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [user]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户成功
            user:
              $ref: "#/components/schemas/UserItem"
    UpdateUserBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 新用户名；trim，非空，最多 100 字符
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 明文新密码；trim，非空，最多 100 字符；服务端 bcrypt 后写入
          minLength: 1
          maxLength: 100
    UpdateUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 更新用户成功
    DeleteUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除用户成功

    PostAuthor:
      type: object
      description: 文章关联作者；与 `post.service.js` 中 `authorAttributes` 一致
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: string
          nullable: true
          description: 头像 URL 或路径，可为 null
    PostCategory:
      type: object
      description: 文章所属叶子分类（id/name）；与 `post.service.js` 中 `categoryAttributes` 一致
      properties:
        id:
          type: integer
        name:
          type: string
    CategoryTreeNode:
      type: object
      description: 分类节点；根节点含 `children` 为二级列表，叶子无 `children`
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
          nullable: true
        sortOrder:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTreeNode"
    CategoriesListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [categories]
          properties:
            code:
              example: 200
            msg:
              example: 获取分类成功
            categories:
              type: array
              items:
                $ref: "#/components/schemas/CategoryTreeNode"
    PostItem:
      type: object
      description: Sequelize Post 行序列化结果，含嵌套 `author` 与 `category`
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
        authorId:
          type: integer
        categoryId:
          type: integer
          description: 所属二级（叶子）分类 id
        images:
          type: array
          description: 正文配图路径列表，与 `POST /api/uploads` 返回及入库规则一致
          items:
            type: string
            example: "/uploads/2026/05/1712345678901-a1b2c3d4e5f67890.jpg"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
        category:
          $ref: "#/components/schemas/PostCategory"
    PostsListPagination:
      type: object
      description: 与文章列表接口返回的 `pagination` 一致（结构与用户分页相同）
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
    PostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章列表成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    MyPostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取我的文章成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    PostOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    CreatePostBody:
      type: object
      required: [title, content, categoryId]
      properties:
        title:
          type: string
          description: trim，非空，最多 200 字符（与 `post.schema.js` 一致）
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: trim，非空
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 必须为二级叶子分类 id（见 `GET /api/categories`）
        published:
          type: boolean
          description: 可选；缺省由服务端处理（当前实现为 `Boolean(payload.published)`，未传则为 false）
        images:
          type: array
          description: 可选；缺省为 `[]`。每项须为 `/uploads/` 开头的本站路径（见上传接口）
          maxItems: 24
          items:
            type: string
    UpdatePostBody:
      type: object
      description: 部分更新；至少提供一个字段（否则服务端 400「没有要更新的字段」）
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 可选；若传则须为二级叶子分类 id
        published:
          type: boolean
        images:
          type: array
          maxItems: 24
          items:
            type: string
    CreatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 创建文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    UpdatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 更新文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    DeletePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除文章成功

    UploadImagesSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [urls]
          properties:
            code:
              example: 200
            msg:
              example: 上传成功
            urls:
              type: array
              description: 可写入文章 `images` 的公开路径（`/uploads/年/月/文件名`）
              items:
                type: string

    CommentReplyItem:
      type: object
      description: 单条评论（含嵌套回复时不含 `replies` 字段）；与 Sequelize 序列化一致
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: integer
        parentId:
          type: integer
          nullable: true
          description: 顶层为 null；回复时为父评论 id
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
    CommentThreadItem:
      allOf:
        - $ref: "#/components/schemas/CommentReplyItem"
        - type: object
          properties:
            replies:
              type: array
              description: 仅列表接口顶层评论含此字段；该顶层下的全部直接回复（按 id 升序，`comment.service.js` 不再截断条数）
              items:
                $ref: "#/components/schemas/CommentReplyItem"
    CommentsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comments, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取评论列表成功
            comments:
              type: array
              items:
                $ref: "#/components/schemas/CommentThreadItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    CreateCommentBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: trim，非空，最长 5000 字符（与 `comment.schema.js` 一致）
          minLength: 1
          maxLength: 5000
        parentId:
          type: integer
          minimum: 1
          description: 可选；回复时传入父评论 id，且该评论须属于路径中的文章。可与 `comment.schema.js` 一致地传字符串数字或 `null`（视为未回复）。
    CreateCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comment]
          properties:
            code:
              example: 200
            msg:
              example: 发表评论成功
            comment:
              $ref: "#/components/schemas/CommentReplyItem"
    DeleteCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除评论成功

paths:
  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: Zod 或业务校验失败（如用户名为空、超长；`msg` 可能为多条信息用 `; ` 拼接）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                empty:
                  value:
                    code: 400
                    msg: 用户名不能为空
        "409":
          description: 冲突 — 用户名已被占用（Sequelize `UniqueConstraintError`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 409
                msg: 用户名已存在
        "500":
          description: 服务端异常（未标记 `expose` 时为「服务器内部错误」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsBody"
      responses:
        "200":
          description: 登录成功，返回 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 凭证无效（用户名或密码错误；不区分是否在册）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 401
                msg: 用户名或密码错误
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/users:
    get:
      tags: [用户]
      summary: 获取用户列表
      description: |
        需在请求头携带 Bearer JWT。
        查询参数 `page`、`limit` 由 `getUsersSchema` 校验：缺省分别为 `1`、`10`；须为正整数；`limit` 不超过 100。
        列表按用户 `id` 升序分页；响应体含 `users`（当前页）与 `pagination`（total、totalPages、hasNext）。
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 页码，缺省 1；正整数
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: 每页条数，缺省 10；正整数，最大 100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListSuccess"
        "400":
          description: 分页等参数校验失败（如非正整数）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT（`msg` 为「未登录或登录已过期」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/getOneUser:
    get:
      tags: [用户]
      summary: 按查询参数获取单个用户
      description: |
        `GET /api/getOneUser?id=1`。查询参数 `id` 必填，须为不含前导零的正整数字符串（与 `user.schema.js` 中 `idSchema` 一致，如 `1` 合法，`01` 不合法）。
        需 Bearer JWT。成功响应与 `GET /api/users/{id}` 相同。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: 用户主键字符串，匹配 `^[1-9]\d*$`
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOneSuccess"
        "400":
          description: 缺少或非法 `id`、或其它 Zod 校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/users/{id}:
    get:
      tags: [用户]
      summary: 按路径主键获取单个用户
      description: |
        路径参数 `id` 为不含前导零的正整数字符串。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 用户主键，匹配 `^[1-9]\d*$`（Express 以字符串传入 Zod）
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOneSuccess"
        "400":
          description: 路径 `id` 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

    put:
      tags: [用户]
      summary: 按主键更新用户
      description: |
        请求体须提供 username、password（长度与注册一致）；密码会重新 bcrypt 后入库。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserSuccess"
        "400":
          description: 参数校验失败（Zod 或 service 层「用户名或密码不能为空」）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

    delete:
      tags: [用户]
      summary: 按主键删除用户
      description: 先 `findByPk` 再 `destroy`。需 Bearer JWT。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserSuccess"
        "400":
          description: 路径 `id` 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 未找到该 id 对应用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 用户不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/uploads:
    post:
      tags: [上传]
      summary: 上传正文配图（多文件）
      description: |
        需 Bearer JWT。`Content-Type: multipart/form-data`，字段名 **`files`**，可选多个文件。
        单文件最大 5MB；类型限 jpeg / png / gif / webp。响应体根级字段 **`urls`** 填入 `POST/PATCH /api/posts` 的 `images` 数组。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImagesSuccess"
        "400":
          description: 未选择文件、类型不符或超出大小/数量限制
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/categories:
    get:
      tags: [分类]
      summary: 获取两级分类树
      description: |
        无需 JWT。根节点为一级分类（`parentId` 为 null），`children` 为二级叶子；与启动后种子数据或自建数据一致。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesListSuccess"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/posts:
    get:
      tags: [文章]
      summary: 获取已发布文章列表（分页）
      description: |
        无需 JWT。仅查询 `published: true`；排序为 id 降序。
        查询参数 `page`、`limit`、`parentId`、`categoryId` 与 `post.schema.js` 中 `listPostsQuerySchema` 一致：缺省 `1`、`10`；须为正整数；`limit` 最大 100。
        `parentId` 为**一级分类 id** 时返回归属其下任一叶子的文章；`categoryId` 为**叶子分类 id**；二者不得同时传递。
        传 `categoryId` 时若不是有效叶子则 400。
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: parentId
          in: query
          required: false
          description: 一级分类 id；与 categoryId 二选一
          schema:
            type: integer
            minimum: 1
        - name: categoryId
          in: query
          required: false
          description: 二级叶子分类 id；与 parentId 二选一
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsListSuccess"
        "400":
          description: 分页或分类筛选参数校验失败（含 parentId 与 categoryId 同传、一级 id 无效等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    post:
      tags: [文章]
      summary: 创建文章
      description: 需在请求头携带 Bearer JWT；正文字段见 `post.schema.js` 中 `postBodySchema`。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "200":
          description: 创建成功（HTTP 200，与项目统一 `success` 响应一致）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePostSuccess"
        "400":
          description: Zod 校验失败或服务层「标题或正文不能为空」
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

