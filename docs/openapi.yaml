  /api/posts/{postId}/comments:
    get:
      tags: [评论]
      summary: 获取某篇文章的评论列表（分页）
      description: |
        文章可见性与 `services/post.service.ts` 中 `findPostByIdPublic` 一致：公开访客仅可读**已发布**文章下的评论；路径中文章不存在或未发布时为 404「文章不存在」。作者浏览自己**未发布**文章下的评论须携带合法 Bearer JWT（见 `middlewares/optionalAuth.middleware.ts`）；**非法或过期 token 静默忽略**，不报错。
        查询参数：`page` 缺省 `1`，`limit` 缺省 `20`、最大 `100`（与 `schema/comment.schema.ts` 一致）。
        **`pagination.total` / `totalPages` / `hasNext` 仅针对主评分页**；**`pagination.commentTotal` 为该文评论总条数（含回复）**。每条主评的 `replies` 为该楼内全部回复的**扁平列表**（非仅一层子节点），项含可选 `replyToUser`。
      security:
        - {}
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          description: 文章主键，不含前导零的正整数字符串
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListSuccess"
        "400":
          description: 路径或分页参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 文章不存在或当前访问者无权查看（未发布且非作者等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    post:
      tags: [评论]
      summary: 发表评论（可回复某条评论）
      description: |
        需在请求头携带 Bearer JWT；`content` 必填；可选 `parentId` 表示回复（父评论须属于该文章）。
        文章可见性由 `findPostByIdPublic(postId, 当前用户 id)` 判定：**已发布**文章任意登录用户可评；**未发布**文章仅 **作者本人**可评。
        **`content`** 会先敏感词检测后 XSS 净化；命中敏感词 **`400`** 且不落库。
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentSuccess"
        "400":
          description: |
            参数校验失败；内容为空；父评论不存在或不属于该文章；或敏感词命中（`msg` 固定为示例）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                sensitiveWords:
                  summary: 敏感言论拦截
                  value:
                    code: 400
                    msg: 包含敏感言论，请删除敏感言论再试试？
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 文章不存在，或存在但未发布且当前用户非作者（`services/comment.service.ts` → `findPostByIdPublic`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

