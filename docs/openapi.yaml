                  type: string
                  minLength: 1
                  maxLength: 100
                avatar:
                  type: string
                  nullable: true
                  maxLength: 500
                password:
                  type: string
                  minLength: 1
                  maxLength: 100
                roleId:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "400":
          description: 校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 无任一所需权限，或业务拒绝（如禁止将他人升为 super_admin）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

    delete:
      tags: [管理端]
      summary: 撤销后台身份（DELETE staff）
      description: |
        需 Bearer；**`admin.staff.delete`**。**禁止删除当前登录用户自身**（403）；成功时 `msg` 典型为「已撤销后台身份」。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
      responses:
        "200":
          description: 已撤销后台身份
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "400":
          description: id 非法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 无删权限、自杀删除、或最后一个 super_admin 保护等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

