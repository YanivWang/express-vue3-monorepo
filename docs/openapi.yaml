# 接口契约：可提交仓库，团队共用；运行时可 GET /openapi.yaml（与 apps/backend/rest-api/src/swagger.ts 一致）；Swagger UI：/api-docs。Apifox 可导入本文件。
openapi: 3.0.3
info:
  title: express-vue3-monorepo · REST API（@express-vue3-monorepo/rest-api）
  version: 1.0.0
  description: |
    后端包 `apps/backend/rest-api`（Express ESM + TypeScript）；业务路由挂载于 `/api`，与 `src/app.ts`、`src/routes/*.routes.ts` 一致。
    - 依赖：启动前 **`REDIS_URL` 必填**（`src/env.ts`）；**Redis** 用于 JWT 登出黑名单（`auth-token.service.ts`）、RBAC 权限快照缓存（`rbac.service.ts`，读写异常时回源 MySQL，不阻断鉴权）。
    - 文档：`GET /openapi.yaml`（YAML 原文）、`GET /api-docs`（Swagger UI）；契约源文件为仓库根 `docs/openapi.yaml`，由 `src/swagger.ts` 加载。
    - 安全与传输：`helmet`（`/api-docs` 路径关闭 CSP 以便 Swagger UI）；`cors` 行为见 `src/env.ts`（生产须配置 `CORS_ORIGINS`）。较大 JSON 响应可能经 `compression.middleware.ts` 压缩（`Content-Encoding: gzip` 等）。
    - 追踪：`requestId.middleware.ts` 写入响应头 **`X-Request-Id`**；客户端可传入同名请求头透传（最长 128 字符）。
    - 限流（`middlewares/rateLimit.middleware.ts`）：`/health`、`/ready` 与 **GET `/uploads/...` 静态** 在 `src/app.ts` 中先于全局限流挂载，故 **15 分钟窗口计数不作用于这些路径**；限流器内对 `/health`、`/ready` 的 `skip` 为兜底。其余进入全局限流的 API **15 分钟 / 最多 100 次**，超限 HTTP 429，`msg` 为「请求过于频繁，请稍后再试」。`POST /api/register`、`POST /api/login` 另挂载 **1 分钟 / 最多 60 次**。
    - 认证：`POST /api/register`、`POST /api/login` 无需登录。注册/登录请求体校验见 `src/schema/auth.schema.ts`（用户名 trim 后长度 2～100；密码 6～100）；用户更新接口见 `src/schema/user.schema.ts`（username/password 规则与注册不同）。
    - 用户：`src/routes/user.routes.ts`：**`GET /api/me`**（需 Bearer）返回轻量资料、**`nickname`**（扩展表）与 **`permissions`** RBAC 快照；**`GET/PATCH /api/me/profile`** 为当前用户扩展资料（`UserProfiles` 全量 / 部分更新 upsert）。注册用户/职员的运维请走 **`/api/admin/portal-users`**、**`/api/admin/staff`**。
    - 分类：`GET /api/categories` 公开；**`POST /api/categories`** 创建二级叶子须在 **Bearer** 下且具备 **`admin.categories.write`**。返回两级树，节点含 `id`、`name`、`parentId`、`sortOrder`，根的 `children` 为二级叶子。文章创建时 `categoryId` 必须为二级叶子 id；`GET /api/posts` 可选 `parentId`（一级 id）或 `categoryId`（叶子 id），二者不得同传。一级分类与 PATCH/DELETE 见 **`/api/admin/categories/...`**。
    - 上传：**`POST /api/uploads`** 与 **`POST /api/uploads/profiles`** 均需 Bearer；`multipart/form-data` 字段名 **`files`**；类型 jpeg/png/gif/webp。
      - 富文本插图：`/api/uploads`，**单次最多 9 张**，**单张最大 8MB**，落盘 **`uploads/posts/<年>/<月>/`**，URL **`/uploads/posts/…`**，由编辑器嵌入正文 HTML 的 `<img src>` 引用。
      - **头像等用户资料图**：`/api/uploads/profiles`，**单次仅 1 张**，**单张最大 8MB**，落盘 **`uploads/profiles/<年>/<月>/`**，URL **`/uploads/profiles/…`**（可写入 `User.avatar` 等）。
      - **大文件分片（单文件最大 1GB，与 `packages/shared` 常量一致）**：`POST /api/uploads/large/init` → `PUT .../chunks/{chunkIndex}`（表单字段 **`chunk`**，请求头 **`X-Chunk-Md5`**）→ `POST .../merge`；`GET .../status` 查询断点；`DELETE ...` 取消任务。成品 URL 形如 **`/uploads/large/...`**，任务 TTL **24h**（过期 `410`）。
      - 静态访问 **`GET /uploads/...`**（不走 API 全局限流）。
    - 文章：正文为 HTML 字符串，配图/视频须嵌入正文（`<img>` / `<video>` 的 `src` 须为本站 **`/uploads/...`**，入库前经 `content-safety.ts` 净化）。`GET /api/posts` 公开分页（仅 `published: true`）；`GET /api/posts/{id}` 未挂载可选 JWT，`findPostByIdPublic` 的访问者恒为匿名，**未发布文章对任意客户端（含作者）均返回 404**；`POST /api/posts/{postId}/comments` 校验文章时传入**当前登录用户 id**，故 **作者仍可对本人的未发布文章发表评论**（与详情 GET 行为不一致，以 controller/service 为准）。`GET /api/posts/mine/list` 及创建/更新/删除需 Bearer；更新/删除在 **RBAC** 下为 **作者本人** 或具备 **`admin.posts.write`** / **`admin.posts.delete`** 等权限（见 `post.service.ts`）。
    - 内容与敏感词：发帖（`POST /api/posts`、`PUT /api/posts/{id}` 涉及 `title`/`content`）、发评（`POST .../comments`）在 **`400`** 可返回固定 **`msg`**「包含敏感言论，请删除敏感言论再试试？」（见 `utils/content-safety.ts`）；**先敏感词校验，再服务端 XSS 净化后入库**。
    - **管理端**：`/api/admin/...` 路由均须 Bearer；按细粒度 **`requirePermission`** 校验，`403` 为权限不足。**`GET /api/admin/posts`** 等见 paths 小节。
    - 评论：`GET /api/posts/{postId}/comments` 挂载 `optionalAuthMiddleware`；`POST` 发评与 `DELETE` 删评需 Bearer；删除限评论作者、文章作者或具备 **`admin.comments.delete`**（及等价 RBAC）的账号。
    - 参数校验：`middlewares/validate.middleware.ts` + Zod；失败时 HTTP 400，`msg` 为多条校验信息以 `; ` 拼接。
    - 未匹配路由：全局 404，`msg` 为「接口不存在」。
    - `GET /api/me`：**无**分页用户列表接口；注册用户列表使用 **`GET /api/admin/portal-users`**（须 `admin.portal_users.read`）。
    - `GET /api/posts`、`GET /api/posts/mine/list`：分页与同上分类筛选参数；响应含 `posts` 与 `pagination`。
    - `GET /api/posts/{postId}/comments`：`page`、`limit` 缺省 1、20，`limit` 最大 100；**`pagination.total` / `totalPages` / `hasNext` 仅针对顶层评论（主评）**；**`pagination.commentTotal` 为该文下评论总条数（含全部回复）**。每条顶层评论含 **`replies`：同一楼主下的全部回复的扁平列表**（按 `createdAt` 升序、`id` 升序；**含对回复的再回复**），每项可含 **`replyToUser`**（被直接回复评论的作者快照）以支持「A ▸ B」展示。删文章时评论随 Post 关联 `ON DELETE CASCADE`。

servers:
  - url: http://127.0.0.1:{gw}
    description: |
      Docker Compose Nginx 统一入口（GATEWAY_HOST_PORT，默认 2026）；与浏览器访问 `/`、`/api/...`、`/api-docs` 同源。
    variables:
      gw:
        default: "2026"
        description: 网关宿主端口（环境变量 GATEWAY_HOST_PORT）

  - url: http://127.0.0.1:{port}
    description: |
      直连 `pnpm rest-api:dev` 或宿主映射到后端时，`port` 与进程环境变量 PORT 一致（缺省 3000）。
    variables:
      port:
        default: "3000"
        description: 应用监听端口（环境变量 PORT）

tags:
  - name: 探针
    description: 存活 / 就绪检查（在 app 中先于全局限流挂载，不经限流计数）
  - name: 认证
    description: 注册与登录（无需 Bearer）
  - name: 用户
    description: 用户列表与单条查询、更新、删除（需 Bearer JWT）
  - name: 文章
    description: 文章列表、详情、我的文章与增删改（部分接口需 Bearer JWT）
  - name: 分类
    description: 两级分类树（公开 GET）
  - name: 上传
    description: 富文本插图多文件上传（需 Bearer JWT）
  - name: 评论
    description: 文章下的评论列表、发表与删除（列表可选 Bearer，发评/删评需 Bearer JWT）
  - name: 当前用户
    description: 当前登录用户公开资料与 RBAC 权限快照（`GET /api/me`）
  - name: 管理端
    description: 管理端 API（`/api/admin/*`）；须 Bearer 且在 `requirePermission` 下校验细粒度权限码

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "登录接口返回的 JWT；请求头 Authorization 为「Bearer」+ 空格 + token。过期或未携带返回 401。"

  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码；本服务错误响应中与 HTTP 状态码一致（如 400/401/404/409/500）。
        msg:
          type: string
    LargeUploadInitBody:
      type: object
      required: [fileName, fileSize, chunkSize]
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        fileSize:
          type: integer
          minimum: 1
          maximum: 1073741824
          description: 单文件最大 **1GB**（`LARGE_UPLOAD_MAX_FILE_BYTES`，见 `packages/shared`）
        chunkSize:
          type: integer
          minimum: 1048576
          maximum: 8388608
          description: 单片 **1～8MB**；`ceil(fileSize/chunkSize)` 须在 **1～2000**（见 `large-upload.schema.ts`）
        mimeType:
          type: string
          maxLength: 128
        fileMd5:
          type: string
          description: 32 位 MD5 hex；传入则启用 MD5 临时目录、合并校验与全局秒传
          pattern: "^[a-fA-F0-9]{32}$"
    LargeUploadInitSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            instant:
              type: boolean
            publicUrl:
              type: string
              description: 秒传时返回成品 URL
            uploadId:
              type: string
              format: uuid
              description: 非秒传时返回任务 id
            chunkTotal:
              type: integer
            expiresAt:
              type: string
              format: date-time
              description: 任务建议过期时间（服务端 TTL **24h**）
    LargeUploadStatusSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [status, chunkTotal, receivedIndices]
          properties:
            code:
              example: 200
            msg:
              example: ok
            status:
              type: string
              enum: [uploading, merging, done, failed]
              description: 传输中 / 合并中 / 已完成 / 失败（失败态依实现）
            chunkTotal:
              type: integer
              description: 计划分片总数；秒传完成场景可能为 0
            receivedIndices:
              type: array
              description: "已校验落地的分片下标；任务 done 时通常为空数组"
              items:
                type: integer
                minimum: 0
                maximum: 1999
            publicUrl:
              type: string
              description: "任务已完成（done）时返回成品 URL，形如 /uploads/large/..."
            fileName:
              type: string
              description: 未上传完时返回，便于客户端展示
            fileSize:
              type: integer
            chunkSize:
              type: integer
    LargeUploadChunkSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [chunkIndex]
          properties:
            code:
              example: 200
            msg:
              example: 分片已接收
            chunkIndex:
              type: integer
              minimum: 0
              maximum: 1999
    LargeUploadMergeSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [url, merged]
          properties:
            code:
              example: 200
            url:
              type: string
              description: 成品公开路径，形如 `/uploads/large/...`
            merged:
              type: boolean
              description: "true 表示本次请求执行了合并；false 表示此前已完成（幂等）"
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg, token]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: "JWT（jsonwebtoken）；`jwt.verify` 结果写入 `req.user`，payload 含 `id`、`username`、`roleId`、`roleSlug`；签发 expiresIn 7d。接口授权以库表 RBAC 为准；`GET /api/me` 返回 `permissions` 供前端菜单。"
    CredentialsBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: trim，长度 2～100 字符（与 `schema/auth.schema.ts` 中 `credentialsBodySchema` 一致）
          minLength: 2
          maxLength: 100
        password:
          type: string
          description: trim，长度 6～100 字符
          minLength: 6
          maxLength: 100
    UserItem:
      type: object
      description: Sequelize 用户行序列化结果；当前实现未剔除 password 字段
      properties:
        id:
          type: integer
        username:
          type: string
        password:
          type: string
          description: bcrypt 哈希（接口当前会一并返回）
        avatar:
          type: string
          nullable: true
          description: 头像 URL 或路径
        roleId:
          type: integer
          description: RBAC 角色 id（必填）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    HealthLiveness:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ReadinessOk:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          example: ready
        checks:
          type: object
          required: [mysql, redis]
          properties:
            mysql:
              type: string
              enum: [ok]
            redis:
              type: string
              enum: [ok]
    ReadinessFail:
      type: object
      required: [status, checks, message]
      properties:
        status:
          type: string
          example: not_ready
        checks:
          type: object
          required: [mysql, redis]
          properties:
            mysql:
              type: string
              enum: [ok, failed]
            redis:
              type: string
              enum: [ok, failed]
        message:
          type: string
          example: 依赖不可用：mysql、redis
    UsersListPagination:
      type: object
      description: 与 `user.controller#getUsers` 返回的 `pagination` 字段一致
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          description: 当前页码（从 1 开始）
          minimum: 1
          example: 1
        limit:
          type: integer
          description: 每页条数（最大 100，与 Zod schema 一致）
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          description: 用户总条数
          minimum: 0
        totalPages:
          type: integer
          description: 总页数；无数据时为 0
          minimum: 0
        hasNext:
          type: boolean
          description: 是否还有下一页
    UsersListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [users, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户列表成功
            users:
              type: array
              items:
                $ref: "#/components/schemas/UserItem"
            pagination:
              $ref: "#/components/schemas/UsersListPagination"
    UserOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [user]
          properties:
            code:
              example: 200
            msg:
              example: 获取用户成功
            user:
              $ref: "#/components/schemas/UserItem"
    UpdateUserBody:
      type: object
      description: 与 `schema/user.schema.ts` 中 `userBodySchema` 一致（非注册 credential 规则）
      required: [username, password]
      properties:
        username:
          type: string
          description: 新用户名；trim，非空，最多 100 字符
          minLength: 1
          maxLength: 100
        password:
          type: string
          description: 明文新密码；trim，非空，最多 100 字符；服务端 bcrypt 后写入
          minLength: 1
          maxLength: 100
    UpdateUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 更新用户成功
    DeleteUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除用户成功

    PostAuthor:
      type: object
      description: 文章关联作者；与 `services/post.service.ts` 中 `authorAttributes` 一致
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: string
          nullable: true
          description: 头像 URL 或路径，可为 null
    PostCategory:
      type: object
      description: 文章所属叶子分类（id/name）；与 `services/post.service.ts` 中 `categoryAttributes` 一致
      properties:
        id:
          type: integer
        name:
          type: string
    CategoryTreeNode:
      type: object
      description: 分类节点；根节点含 `children` 为二级列表，叶子无 `children`
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
          nullable: true
        sortOrder:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryTreeNode"
    CategoriesListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [categories]
          properties:
            code:
              example: 200
            msg:
              example: 获取分类成功
            categories:
              type: array
              items:
                $ref: "#/components/schemas/CategoryTreeNode"

    CreateCategoryDuplicateSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [category, reused]
          properties:
            category:
              $ref: "#/components/schemas/CategoryTreeNode"
            reused:
              type: boolean
              description: 同级同名二级叶子已存在时为 true，接口返回既有节点

    AdminCategoryOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [category]
          properties:
            category:
              $ref: "#/components/schemas/CategoryTreeNode"

    PostItem:
      type: object
      description: Sequelize Post 行序列化结果，含嵌套 `author` 与 `category`
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
        authorId:
          type: integer
        categoryId:
          type: integer
          description: 所属二级（叶子）分类 id
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
        category:
          $ref: "#/components/schemas/PostCategory"
        commentCount:
          type: integer
          minimum: 0
          description: 评论条数（含回复）
        favoriteCount:
          type: integer
          minimum: 0
        likeCount:
          type: integer
          minimum: 0
        dislikeCount:
          type: integer
          minimum: 0
        viewCount:
          type: integer
          minimum: 0
          description: 阅读次数 PV（仅在详情接口成功读取已发布正文时递增；作者浏览自身文章默认不计）
        myVote:
          type: string
          nullable: true
          enum: [like, dislike]
          description: 当前登录用户对本文的立场；匿名或未投票时通常为 null（列表在无 JWT 时可省略字段）
        myFavorited:
          type: boolean
          description: 当前登录用户是否已收藏；匿名时可省略字段
    PostsListPagination:
      type: object
      description: 与文章列表接口返回的 `pagination` 一致（结构与用户分页相同）
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
    PostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章列表成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    MyPostsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [posts, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取我的文章成功
            posts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"
            pagination:
              $ref: "#/components/schemas/PostsListPagination"
    PostOneSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 获取文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    CreatePostBody:
      type: object
      required: [title, content, categoryId]
      properties:
        title:
          type: string
          description: trim，非空，最多 200 字符（与 `schema/post.schema.ts` 一致）
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: trim，非空
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 必须为二级叶子分类 id（见 `GET /api/categories`）
        published:
          type: boolean
          description: 可选；缺省由服务端处理（当前实现为 `Boolean(payload.published)`，未传则为 false）
        externalSource:
          type: string
          maxLength: 64
          description: 可选；与 `externalKey` 须同时提供。具备 `admin.posts.write` 时可用于导入幂等（同一 `(externalSource, externalKey)` 返回已有帖子）。
        externalKey:
          type: string
          maxLength: 128
          description: 可选；与 `externalSource` 须同时提供。
    UpdatePostBody:
      type: object
      description: 部分更新；至少提供一个字段（否则服务端 400「没有要更新的字段」）
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
        categoryId:
          type: integer
          minimum: 1
          description: 可选；若传则须为二级叶子分类 id
        published:
          type: boolean
    CreatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 创建文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    UpdatePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [post]
          properties:
            code:
              example: 200
            msg:
              example: 更新文章成功
            post:
              $ref: "#/components/schemas/PostItem"
    DeletePostSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除文章成功

    UploadImagesSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [urls]
          properties:
            code:
              example: 200
            msg:
              example: 上传成功
            urls:
              type: array
              description: 富文本正文 `<img src>` 或用户 **`avatar`** 等可用的公开路径（`/uploads/posts/…` 来自 **`POST /api/uploads`**；`/uploads/profiles/…` 来自 **`POST /api/uploads/profiles`**）
              items:
                type: string

    CommentReplyItem:
      type: object
      description: 单条评论（楼内 `replies` 数组中的项为扁平结构，不含嵌套 `replies`）；与 `services/comment.service.ts` 返回的 JSON 一致
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: integer
        parentId:
          type: integer
          nullable: true
          description: 顶层为 null；回复时为父评论 id
        rootId:
          type: integer
          nullable: true
          description: 楼主评 id；顶层评论与自身 id 相同；回复为所属主评 id
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/PostAuthor"
        replyToUser:
          allOf:
            - $ref: "#/components/schemas/PostAuthor"
          nullable: true
          description: 被直接回复的一方作者（A ▸ B）；主评或省略时为 null
    CommentsListPagination:
      type: object
      description: 评论列表分页；`total` 为主评条数（与文章列表 `PostsListPagination.total` 语义不同）
      required: [page, limit, total, totalPages, hasNext, commentTotal]
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total:
          type: integer
          minimum: 0
          description: 主评（parentId 为 null）总数，用于 totalPages
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        commentTotal:
          type: integer
          minimum: 0
          description: 该文下评论总条数（主评 + 全部回复）
    CommentThreadItem:
      allOf:
        - $ref: "#/components/schemas/CommentReplyItem"
        - type: object
          properties:
            replies:
              type: array
              description: 仅列表接口顶层含此字段；该主楼下全部回复的扁平列表（按 createdAt、id 升序；含对回复的再回复）
              items:
                $ref: "#/components/schemas/CommentReplyItem"
    CommentsListSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comments, pagination]
          properties:
            code:
              example: 200
            msg:
              example: 获取评论列表成功
            comments:
              type: array
              items:
                $ref: "#/components/schemas/CommentThreadItem"
            pagination:
              $ref: "#/components/schemas/CommentsListPagination"
    CreateCommentBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: trim，非空，最长 5000 字符（与 `schema/comment.schema.ts` 一致）
          minLength: 1
          maxLength: 5000
        parentId:
          type: integer
          minimum: 1
          description: 可选；回复时传入父评论 id，且该评论须属于路径中的文章。可与 `schema/comment.schema.ts` 中逻辑一致地传字符串数字或 `null`（视为未回复）。
    CreateCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [comment]
          properties:
            code:
              example: 200
            msg:
              example: 发表评论成功
            comment:
              $ref: "#/components/schemas/CommentReplyItem"
    DeleteCommentSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 删除评论成功

    CurrentUserPayload:
      type: object
      description: "`user.controller.ts` → `getMe` 合并 RBAC 快照后的 `data.user`（轻量；`nickname` 来自 `UserProfiles`，无资料行则为 null）"
      required: [id, username, avatar, nickname]
      properties:
        id:
          type: integer
        username:
          type: string
        avatar:
          type: string
          nullable: true
        nickname:
          type: string
          nullable: true
          description: 来自 UserProfiles；无扩展行或未填则为 null
        roleId:
          type: integer
          description: RBAC 角色主键（与 Users.roleId 一致；快照加载失败时可能省略）
        roleSlug:
          type: string
          example: user
        permissions:
          type: array
          items:
            type: string
          description: 当前角色被授予的权限码列表；`super_admin` 为全集
    CurrentUserSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          required: [user]
          properties:
            code:
              example: 200
            msg:
              example: 获取当前用户成功
            user:
              $ref: "#/components/schemas/CurrentUserPayload"

    UserProfilePayload:
      type: object
      description: UserProfiles 表业务列（无密码）
      required:
        [
          id,
          userId,
          nickname,
          avatar,
          gender,
          birthday,
          bio,
          address,
          company,
          jobTitle,
          isMarried,
          mom,
          father,
          university,
          createdAt,
          updatedAt,
