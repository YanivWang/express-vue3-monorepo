        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/posts/{id}:
    get:
      tags: [文章]
      summary: 按 id 获取文章详情
      description: |
        无需 JWT。`findPostByIdPublic`：仅已发布可匿名浏览；未发布时仅当「当前请求的 JWT payload 中的用户 id」与作者一致时可读，但本路由未挂载可选 JWT，`req.user` 恒为空，故未发布文章一律 404。id 不存在或未发布时均为 404，`msg` 为「文章不存在」。
      parameters:
        - name: id
          in: path
          required: true
          description: 文章主键，不含前导零的正整数字符串（与 Zod `idSchema` 一致）
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostOneSuccess"
        "400":
          description: 路径 id 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 不存在或未发布（对外统一为文章不存在）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    put:
      tags: [文章]
      summary: 更新文章（部分字段）
      description: |
        需在请求头携带 Bearer JWT。请求体为 `postBodySchema.partial()`，至少包含一个字段；作者或管理员（`role === 1`）可修改。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePostSuccess"
        "400":
          description: id 非法、请求体校验失败或「没有要更新的字段」
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非作者且非管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 403
                msg: 无权修改该文章
        "404":
          description: 文章不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    delete:
      tags: [文章]
      summary: 删除文章
      description: 需在请求头携带 Bearer JWT；作者或管理员可删除。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePostSuccess"
        "400":
          description: 路径 id 格式不合法
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "403":
          description: 非作者且非管理员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 403
                msg: 无权删除该文章
        "404":
          description: 文章不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/posts/{postId}/comments:
    get:
      tags: [评论]
      summary: 获取某篇文章的评论列表（分页）
      description: |
        文章可见性与 `post.service.js` 中 `findPostByIdPublic` 一致：公开访客仅可读**已发布**文章下的评论；路径中文章不存在或未发布时为 404「文章不存在」（作者访问自己**未发布**文章时，须在请求头携带合法 Bearer JWT，由 `optionalAuthMiddleware` 写入 `req.user`）。
        查询参数：`page` 缺省 `1`，`limit` 缺省 `20`、最大 `100`（与 `listCommentsSchema` 一致）。
        分页数据为顶层评论（`parentId` 为 null），每条下的 `replies` 为该顶层下的全部直接回复（按 id 升序，不截断）。
      parameters:
        - name: postId
          in: path
          required: true
          description: 文章主键，不含前导零的正整数字符串
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListSuccess"
        "400":
          description: 路径或分页参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 文章不存在或当前访问者无权查看（未发布且非作者等）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
    post:
      tags: [评论]
      summary: 发表评论（可回复某条评论）
      description: 需在请求头携带 Bearer JWT；`content` 必填；可选 `parentId` 表示回复（父评论须属于该文章）。
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[1-9]\\d*$"
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentSuccess"
        "400":
          description: 参数校验失败、内容为空、父评论不存在或不属于该文章等
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "401":
          description: 未携带或无效 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
        "404":
          description: 文章不存在或无权访问（与公开读详情规则一致）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 404
                msg: 文章不存在
        "500":
          description: 服务端异常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"

  /api/posts/{postId}/comments/{commentId}:
    delete:
      tags: [评论]
      summary: 删除评论
