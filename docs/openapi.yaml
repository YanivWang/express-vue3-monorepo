# 接口契约：可提交仓库，团队共用；Apifox 选择「导入」→ OpenAPI → 本文件（或开发环境用 http://localhost:<PORT>/openapi.yaml）
openapi: 3.0.3
info:
  title: Express ESM 接口文档
  version: 1.0.0
  description: 注册登录 CRUD

servers:
  - url: http://localhost:3000
    description: 本地（端口以 .env 中 PORT 为准时可先在 Apifox 里改环境地址）

tags:
  - name: 认证
    description: 注册与登录

components:
  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码；本服务错误响应中与 HTTP 状态码一致（如 400/401/409/500）。
        msg:
          type: string
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: JWT，成功时返回

paths:
  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 用户名（与库字段一致；服务端会 trim）
                password:
                  type: string
                  description: 明文密码（服务端会 trim 后哈希入库）
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: 参数校验失败（用户名或密码为空）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 400
                msg: 用户名或密码不能为空
        "409":
          description: 冲突 — 用户名已被占用（违反唯一约束）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 409
                msg: 用户名已存在
        "500":
          description: 服务端异常（如数据库连接失败等非预期错误）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 500
                msg: 注册失败

  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 服务端会 trim，与注册入库一致方能命中
                password:
                  type: string
      responses:
        "200":
          description: 登录成功，返回 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: 参数校验失败（用户名或密码为空）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 400
                msg: 用户名或密码不能为空
        "401":
          description: 未授权 — 凭证无效（用户名或密码错误；故意不区分是否在册以防用户枚举）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 401
                msg: 用户名或密码错误
        "500":
          description: 服务端异常（如数据库连接失败等非预期错误）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 500
                msg: 登录失败
