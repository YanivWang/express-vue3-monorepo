# 接口契约：可提交仓库，团队共用；Apifox 选择「导入」→ OpenAPI → 本文件（或开发环境用 http://localhost:<PORT>/openapi.yaml）
openapi: 3.0.3
info:
  title: Express ESM 接口文档
  version: 1.0.0
  description: 注册登录 CRUD

servers:
  - url: http://localhost:3000
    description: 本地（端口以 .env 中 PORT 为准时可先在 Apifox 里改环境地址）

tags:
  - name: 认证
    description: 注册与登录

components:
  schemas:
    MsgBody:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          description: 业务状态码（与 HTTP 状态码可能一致也可能由实现返回在同一响应中）
        msg:
          type: string
    RegisterSuccess:
      allOf:
        - $ref: "#/components/schemas/MsgBody"
        - type: object
          properties:
            code:
              example: 200
            msg:
              example: 注册成功
    LoginSuccess:
      type: object
      required: [code, msg]
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        token:
          type: string
          description: JWT，成功时返回

paths:
  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 用户名（与库字段一致；服务端会 trim）
                password:
                  type: string
                  description: 明文密码（服务端会 trim 后哈希入库）
      responses:
        "200":
          description: 注册成功（HTTP 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSuccess"
        "400":
          description: |
            参数校验失败（用户名或密码为空），body 含 code 400。
            若服务端未调用 `res.status(400)`，则 HTTP 可能仍为 200，仅以 body.code 区分。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 400
                msg: 用户名或密码不能为空
        "500":
          description: |
            服务端异常（如数据库错误），body 含 code 500。
            若未设置 HTTP 状态码，HTTP 可能仍为 200。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 500
                msg: 注册失败

  /api/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 服务端会 trim，与注册入库一致方能命中
                password:
                  type: string
      responses:
        "200":
          description: 登录成功，返回 JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: |
            参数校验失败（用户名或密码为空），body 通常含 code 400。
            实现若以别的 HTTP 状态返回同一 body，以运行时代码为准。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 400
                msg: 用户名或密码不能为空
        "401":
          description: 未授权 — 用户不存在或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              examples:
                userNotFound:
                  summary: 用户不存在
                  value:
                    code: 401
                    msg: 用户不存在
                wrongPassword:
                  summary: 密码错误
                  value:
                    code: 401
                    msg: 密码错误
        "500":
          description: |
            服务端异常，body 含 code 500。
            若未调用 `res.status(500)`，HTTP 可能仍为 200。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MsgBody"
              example:
                code: 500
                msg: 登录失败
